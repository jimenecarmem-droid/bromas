<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Página de la Broma 😈</title>
<style>
body { font-family: Arial; background:#222; color:#fff; text-align:center; padding:50px; }
h1 { color:#ff4444; }
button { padding:12px 25px; margin:10px; cursor:pointer; border-radius:8px; background:#444; color:#fff; border:none; font-size:16px; transition: all 0.3s; }
button:hover { background:#ff4444; }
textarea { width:80%; height:30px; margin-top:5px; }
.broma-box { margin-top:20px; padding:20px; background:#000; border:2px solid #ff4444; border-radius:10px; }
</style>
</head>
<body>

<h1>Página de la Broma 😈</h1>
<p>Haz clic en un botón para copiar el link de la broma y enviárselo a tus amigos:</p>

<div class="broma-box">
  <strong>💀 Susto de miedo</strong>
  <button onclick="copiarLink('https://tuusuario.github.io/bromas/broma1.html', 'link1')">Copiar link</button>
  <textarea id="link1" readonly></textarea>
</div>

<div class="broma-box">
  <strong>🎮 Simulador Hack de Roblox</strong>
  <button onclick="copiarLink('https://tuusuario.github.io/bromas/broma2.html', 'link2')">Copiar link</button>
  <textarea id="link2" readonly></textarea>
</div>

<div class="broma-box">
  <strong>🖥️ Simulador Hackeo</strong>
  <button onclick="copiarLink('https://tuusuario.github.io/bromas/broma3.html', 'link3')">Copiar link</button>
  <textarea id="link3" readonly></textarea>
</div>

<div class="broma-box">
  <strong>😂 Mensaje divertido</strong>
  <button onclick="copiarLink('https://tuusuario.github.io/bromas/broma4.html', 'link4')">Copiar link</button>
  <textarea id="link4" readonly></textarea>
</div>

<script>
function copiarLink(url, id) {
  document.getElementById(id).value = url;
  document.getElementById(id).select();
  document.execCommand('copy');
  alert('Link copiado! ✅ Puedes enviarlo a tus amigos');
}
</script>

</body>
</html>
